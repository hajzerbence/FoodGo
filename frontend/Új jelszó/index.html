<!doctype html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/Bootstrap/bootstrap.min.css" />
        <link rel="stylesheet" href="/Új jelszó/style.css" />
        <title>FoodGo - Új jelszó</title>
        <link rel="icon" type="image/png" href="/Média/FoodGo favicon.png" />
    </head>
    <body>
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-12 col-md-8 col-lg-5">
                    <div class="card">
                        <h2>Új jelszó beállítása</h2>
                        <p class="text-center text-muted miniSzoveg">Add meg az új jelszavadat.</p>

                        <div class="mb-3">
                            <label for="ujJelszo" class="form-label">Új jelszó</label>
                            <input type="password" class="form-control" id="ujJelszo" name="ujJelszo" placeholder="Új jelszó" required />
                        </div>

                        <input type="button" value="Jelszó mentése" id="jelszoMentesGomb" class="btn btn-success w-100 py-2" />

                        <p class="text-center mt-3 miniSzoveg">
                            <a href="/">Vissza a bejelentkezéshez</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <script src="/Bootstrap/bootstrap.min.js"></script>
        <script src="/Új jelszó/script.js"></script>
    </body>
</html>
